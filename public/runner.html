<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runner :: every runner comes through here first</title>
    <style>
      :root {
        --bg: #000000; --panel: rgba(20,20,23,0.72);
        --line: rgba(255,255,255,0.10); --line-hot: rgba(255,255,255,0.38);
        --text: #a2a2ad; --bright: #ededf0; --dim: #6e6e7a;
        --cyan: #ededf0; --phosphor: #4ade80; --red: #fb7185;
        --sol: #facc15; --rh: #c9c9d2;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; color: var(--text);
        font: 13.5px/1.45 "SF Mono","JetBrains Mono","Fira Code",Menlo,Consolas,monospace;
        background:
          radial-gradient(1200px 700px at 50% -6%, rgba(255,255,255,0.10), transparent 60%),
          #000000;
        min-height: 100vh; letter-spacing: .2px; overflow-x: hidden;
      }
      body::after {
        content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50;
        background:
          radial-gradient(120% 120% at 50% 50%, transparent 70%, rgba(0,0,0,0.5) 100%);
      }
      .field { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
      #grid3d {
        position: fixed; left: 0; right: 0; bottom: 0; width: 100%; height: 420px;
        z-index: 0; pointer-events: none; opacity: 0.85;
        -webkit-mask-image: linear-gradient(to top, #000 66%, transparent 100%);
        mask-image: linear-gradient(to top, #000 66%, transparent 100%);
      }
      .field span { position: absolute; color: var(--cyan); opacity: .08; font-size: 16px; animation: drift 14s ease-in-out infinite; }
      @keyframes drift { 0%,100%{transform:translateY(0) rotate(0);opacity:.05} 50%{transform:translateY(-14px) rotate(8deg);opacity:.14} }
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .cursor { animation: blink 1.1s step-end infinite; color: var(--cyan); }

      .wrap { position: relative; z-index: 1; }
      header {
        display: flex; align-items: center; gap: 14px; padding: 14px 22px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.4));
        position: sticky; top: 0; z-index: 20; backdrop-filter: blur(3px);
      }
      .brand { display: flex; align-items: center; gap: 9px; font-size: 14px; }
      .brand .d { color: var(--cyan); opacity: .8; }
      .brand .name { color: var(--bright); font-weight: 600; letter-spacing: 1.5px; text-shadow: 0 0 12px rgba(255,255,255,0.30); }
      .status { display: flex; align-items: center; gap: 7px; color: var(--phosphor); font-size: 12px; letter-spacing: 1px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--phosphor); box-shadow: 0 0 9px var(--phosphor); animation: pulse 1.6s infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
      .meta { margin-left: auto; color: var(--dim); font-size: 12px; letter-spacing: 1px; }
      .meta .k { color: var(--cyan); }
      .subline { text-align: center; color: var(--dim); font-size: 11.5px; letter-spacing: 2px; padding: 10px 0 2px; }
      .subline .d { color: var(--cyan); opacity: .6; }

      /* ---- stage: rails pinned to the edges, features floating center ---- */
      .stage {
        display: grid; grid-template-columns: 230px minmax(0,1fr) 230px;
        gap: 20px; padding: 18px 26px 10px; align-items: start;
      }
      .zonehead { display: flex; align-items: center; gap: 9px; font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--bright); padding: 4px 4px 12px; }
      .edge.right .zonehead { flex-direction: row-reverse; }
      .zonehead .chip { width: 8px; height: 8px; border-radius: 50%; }
      .edge.left  .chip { background: var(--sol); box-shadow: 0 0 9px var(--sol); }
      .edge.right .chip { background: var(--rh);  box-shadow: 0 0 9px var(--rh); }
      .zonehead .cnt { color: var(--cyan); opacity: .7; font-size: 11px; border: 1px solid var(--line); border-radius: 4px; padding: 1px 7px; }
      .edge.left  .zonehead .cnt { margin-left: auto; }
      .edge.right .zonehead .cnt { margin-right: auto; }

      .wbtn { width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: var(--cyan); font-family: inherit; font-size: 11px; letter-spacing: 1px; padding: 9px 10px; border-radius: 6px; cursor: pointer; text-align: center; transition: border-color .15s, opacity .15s; }
      .wbtn:hover { border-color: var(--line-hot); }
      .wbtn.on { color: var(--phosphor); border-color: rgba(74,222,128,.4); background: rgba(74,222,128,0.06); }
      .wbtn.dim { opacity: .35; }
      .wbtn .wx { color: var(--red); margin-left: 6px; }
      .rail { display: flex; flex-direction: column; gap: 7px; }
      .rail .card:nth-child(n+6) { opacity: .6; }
      .rail .card:nth-child(n+8) { opacity: .4; }
      .stagegrid {
        display: grid;
        grid-template-columns: auto auto auto;
        grid-template-areas: "infoL feats infoR" "infoL chart infoR";
        gap: 16px; align-items: start; justify-content: center;
      }
      .features { grid-area: feats; display: flex; gap: 18px; justify-content: center; align-items: flex-start; }
      .feature { width: 330px; flex-shrink: 0; min-height: 150px; }
      .info.left { grid-area: infoL; justify-self: end; }
      .info.right { grid-area: infoR; justify-self: start; }
      .info:empty { display: none; }
      #chartbox { grid-area: chart; justify-self: center; width: 100%; max-width: 640px; margin-top: 14px; }
      #chartbox:empty { display: none; }
      /* not enough width to sit beside the features → stack it cleanly */
      @media (max-width: 1600px) {
        .stagegrid { grid-template-columns: 1fr; grid-template-areas: "feats" "infoL" "chart" "infoR"; justify-content: stretch; }
        .info.left, .info.right { justify-self: stretch; width: 100%; }
        .info .grid { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
      }
      .empty { color: var(--dim); font-size: 12px; letter-spacing: 1.5px; padding: 48px 6px; text-align: center; }

      /* ---- cards ---- */
      .card {
        position: relative; display: flex; align-items: center; gap: 12px;
        background: var(--panel); border: 1px solid var(--line); border-radius: 7px;
        padding: 11px 13px 11px 15px; cursor: pointer; backdrop-filter: blur(2px);
        transition: border-color .15s, box-shadow .15s, transform .15s;
      }
      .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--cyan), transparent); opacity: .35; border-radius: 7px 0 0 7px; }
      .card:hover { border-color: var(--line-hot); box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 22px rgba(255,255,255,0.06); }
      .card.sel { border-color: var(--cyan); box-shadow: 0 0 0 1px var(--cyan), 0 0 26px rgba(255,255,255,0.20); }
      .icon { width: 38px; height: 38px; border-radius: 5px; flex-shrink: 0; background: rgba(255,255,255,0.06); border: 1px solid var(--line); object-fit: cover; }
      .body { flex: 1; min-width: 0; }
      .name { color: var(--bright); font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .name .sym { color: var(--cyan); text-shadow: 0 0 8px rgba(255,255,255,0.25); }
      .desc { color: var(--dim); font-size: 11.5px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .time { color: var(--dim); font-size: 10.5px; margin-top: 3px; letter-spacing: .5px; }
      .time::before { content: "› "; color: var(--cyan); opacity: .5; }
      .mc { text-align: right; flex-shrink: 0; }
      .mc .val { font-weight: 700; color: var(--phosphor); font-size: 15px; text-shadow: 0 0 10px rgba(74,222,128,0.30); }
      .mc .lbl { color: var(--dim); font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 1px; }
      .mc .val.up { animation: flashUp .8s ease-out; } .mc .val.down { animation: flashDown .8s ease-out; }
      @keyframes flashUp { 0%{color:#b6ffd4;text-shadow:0 0 16px #4ade80} 100%{color:var(--phosphor)} }
      @keyframes flashDown { 0%{color:var(--red);text-shadow:0 0 16px #ff5555} 100%{color:var(--phosphor)} }
      .liq { margin-top: 3px; font-size: 10.5px; color: var(--cyan); letter-spacing: .5px; max-height: 0; opacity: 0; overflow: hidden; transition: max-height .18s ease, opacity .18s ease; }
      .card:hover .liq { max-height: 18px; opacity: 1; }
      .socials { display: flex; gap: 12px; margin-top: 9px; flex-wrap: wrap; }
      .soc { color: var(--cyan); text-decoration: none; font-size: 11.5px; opacity: .85; letter-spacing: .3px; }
      .soc:hover { text-shadow: 0 0 8px var(--cyan); opacity: 1; }
      .info .socials { margin: 0 0 12px; }

      .card.featured {
        flex-direction: column; align-items: stretch; gap: 10px; padding: 20px; border-color: var(--line-hot);
        background: linear-gradient(180deg, rgba(22,22,26,0.6), rgba(10,10,12,0.5));
        box-shadow: 0 0 0 1px rgba(255,255,255,0.10), 0 0 40px rgba(255,255,255,0.07);
      }
      .card.featured::before { width: 3px; opacity: .9; box-shadow: 0 0 14px var(--cyan); }
      .card.featured .top { display: flex; align-items: center; gap: 12px; }
      .card.featured .icon { width: 56px; height: 56px; border-radius: 8px; }
      .card.featured .name { font-size: 16px; white-space: normal; }
      .card.featured .desc { font-size: 12px; white-space: normal; max-height: 34px; overflow: hidden; }
      .card.featured .foot { display: flex; align-items: flex-end; justify-content: space-between; border-top: 1px solid var(--line); padding-top: 12px; }
      .card.featured .mc { text-align: left; }
      .card.featured .mc .val { font-size: 26px; }
      .card.featured .liq { max-height: 18px; opacity: .85; margin-top: 4px; }
      .card.featured .tag { align-self: flex-start; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--phosphor); border: 1px solid rgba(74,222,128,0.4); border-radius: 3px; padding: 2px 7px; }
      .card.featured .hint { align-self: flex-start; font-size: 9.5px; color: var(--dim); letter-spacing: 1px; }
      .card.featured.enter-left  { animation: enterLeft .55s cubic-bezier(.2,.7,.2,1), floaty 5s ease-in-out .6s infinite; }
      .card.featured.enter-right { animation: enterRight .55s cubic-bezier(.2,.7,.2,1), floaty 5s ease-in-out .6s infinite; }
      @keyframes enterLeft  { from{opacity:0; transform:translateX(-80px) scale(.95)} to{opacity:1; transform:translateX(0) scale(1)} }
      @keyframes enterRight { from{opacity:0; transform:translateX(80px)  scale(.95)} to{opacity:1; transform:translateX(0) scale(1)} }
      @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

      .card.mini { padding: 8px 10px; border-radius: 6px; animation: railIn .4s ease; }
      .card.mini .icon { width: 26px; height: 26px; }
      .card.mini .name { font-size: 12px; }
      .card.mini .mc .val { font-size: 12.5px; }
      @keyframes railIn { from{opacity:0; transform:translateY(-6px)} to{opacity:1} }

      /* ---- click-to-expand detail panel ---- */
      .info { width: 310px; max-width: 100%; animation: detailIn .3s ease; }
      .nodes { position: relative; padding-top: 24px; }
      .wires { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
      .wire {
        fill: none; stroke: var(--cyan); stroke-width: 1.2; opacity: .85;
        stroke-dasharray: 520; stroke-dashoffset: 520; animation: drawWire .55s ease forwards;
      }
      @keyframes drawWire { to { stroke-dashoffset: 0; } }
      .wdot { fill: var(--cyan); }
      .wdot.hub { fill: var(--phosphor); }
      .nodecol { display: flex; flex-direction: column; gap: 14px; }
      .nodes.left .nodecol { align-items: flex-start; }
      .nodes.right .nodecol { align-items: flex-end; }
      .node {
        width: 168px; border: 1px solid var(--line-hot); border-radius: 8px; padding: 9px 12px;
        background: linear-gradient(180deg, rgba(22,22,26,0.72), rgba(10,10,12,0.62));
        backdrop-filter: blur(3px); box-shadow: 0 0 22px rgba(255,255,255,0.06);
        animation: detailIn .35s ease;
      }
      .node .nval { font-size: 16px; font-weight: 700; color: var(--bright); }
      .node .nlabel { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-top: 2px; }
      .nclose {
        position: absolute; top: 0; background: none; border: 1px solid var(--line); color: var(--dim);
        border-radius: 5px; cursor: pointer; padding: 2px 8px; font-family: inherit; font-size: 11px; z-index: 2;
      }
      .nclose:hover { color: var(--red); border-color: var(--red); }
      .nodes.left .nclose { left: 0; }
      .nodes.right .nclose { right: 0; }
      @keyframes detailIn { from{opacity:0; transform:translateY(10px)} to{opacity:1} }
      .dhead { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 12px; margin-bottom: 14px; }
      .dhead .icon { width: 44px; height: 44px; }
      .dtitle { font-size: 16px; color: var(--bright); font-weight: 600; flex: 1; min-width: 0; }
      .dtitle .sym { color: var(--cyan); }
      .chainbadge { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-left: 8px; }
      .chainbadge.sol { color: var(--sol); border: 1px solid rgba(250,204,21,.4); }
      .chainbadge.rh  { color: var(--rh);  border: 1px solid rgba(201,201,210,.4); }
      .dactions { display: flex; align-items: center; gap: 10px; }
      .dlink { color: var(--cyan); text-decoration: none; font-size: 12px; }
      .dlink:hover { text-shadow: 0 0 8px var(--cyan); }
      .dclose { background: none; border: 1px solid var(--line); color: var(--dim); border-radius: 5px; cursor: pointer; padding: 4px 10px; font-family: inherit; }
      .dclose:hover { color: var(--red); border-color: var(--red); }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
      .tile { border: 1px solid var(--line); border-radius: 7px; padding: 11px 12px; background: rgba(255,255,255,0.03); }
      .tval { font-size: 16px; font-weight: 700; color: var(--bright); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .tval.up { color: var(--phosphor); } .tval.down { color: var(--red); }
      .tlabel { font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-top: 3px; }
      .wlink { color: var(--cyan); text-decoration: none; font-size: 14px; }
      .wlink:hover { text-shadow: 0 0 8px var(--cyan); }
      .muted { color: var(--dim); font-size: 12px; }
      .chartcard {
        border: 1px solid var(--line-hot); border-radius: 10px; padding: 12px 14px 8px;
        background: linear-gradient(180deg, rgba(22,22,26,0.66), rgba(10,10,12,0.55));
        backdrop-filter: blur(3px); box-shadow: 0 0 40px rgba(255,255,255,0.06);
        animation: detailIn .3s ease;
      }
      .charthead {
        display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
        font-size: 10px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--dim);
      }
      .charthead .csym { color: var(--cyan); font-size: 13px; font-weight: 700; letter-spacing: .5px; text-transform: none; text-shadow: 0 0 8px rgba(255,255,255,0.25); }
      .charthead .cstat { font-size: 12px; letter-spacing: .5px; }
      .livedot {
        margin-left: auto; width: 7px; height: 7px; border-radius: 50%;
        background: var(--phosphor); box-shadow: 0 0 8px var(--phosphor);
        animation: pulse 1.6s infinite;
      }
      .tfs { display: flex; gap: 4px; }
      .tfs button, .tfreset {
        background: rgba(255,255,255,0.05); border: 1px solid var(--line); color: var(--dim);
        font-family: inherit; font-size: 10px; letter-spacing: 1px; padding: 3px 8px;
        border-radius: 5px; cursor: pointer; transition: .15s;
      }
      .tfs button:hover, .tfreset:hover { color: var(--cyan); border-color: var(--line-hot); }
      .tfs button.on { color: var(--phosphor); border-color: rgba(74,222,128,.5); background: rgba(74,222,128,0.08); }
      .chartwrap { position: relative; height: 300px; }
      #pricechart { width: 100%; height: 100%; display: block; }
      .chartmsg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 12px; letter-spacing: 1.5px; }
      .nochart { margin-top: 14px; text-align: center; color: var(--dim); font-size: 12px; letter-spacing: 1.5px; padding: 30px 0; }

      @media (max-width: 900px) {
        .stage { grid-template-columns: 1fr; }
        .center { flex-direction: column; align-items: stretch; }
        .feature, .rail { width: 100%; }
        .edge.right .zonehead { flex-direction: row; }
      }
    </style>
  </head>
  <body>
    <div class="field" id="field"></div>
    <canvas id="grid3d"></canvas>
    <div class="wrap">
      <header>
        <a href="/" style="color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:1px;">← $febu</a>
        <div class="brand"><span class="d">✦</span><span class="name">Runner</span><span class="d">✦</span></div>
        <div class="status"><span class="dot"></span> active</div>
        <div class="meta"><span class="k">streams:</span> solana // robinhood <span class="cursor">▊</span></div>
      </header>
      <div class="subline"><span class="d">◇</span> Every Runner will Come Through Here First <span class="d">◇</span></div>

      <div class="stage">
        <section class="edge left">
          <div class="zonehead"><span class="chip"></span> solana <span class="cnt" id="cnt-solana">00</span></div>
          <button class="wbtn" id="wbtn-solana" onclick="walletClick('solana')">⊙ connect phantom</button>
          <div class="rail" id="rail-solana"></div>
        </section>

        <section class="center">
          <div class="stagegrid">
            <div class="info left" id="info-left"></div>
            <div class="features">
              <div class="feature" id="feature-solana"><div class="empty">◇ awaiting signal <span class="cursor">▊</span></div></div>
              <div class="feature" id="feature-robinhood"><div class="empty">◇ awaiting signal <span class="cursor">▊</span></div></div>
            </div>
            <div class="info right" id="info-right"></div>
            <div class="chartbox" id="chartbox"></div>
          </div>
        </section>

        <section class="edge right">
          <div class="zonehead"><span class="chip"></span> robinhood <span class="cnt" id="cnt-robinhood">00</span></div>
          <button class="wbtn" id="wbtn-robinhood" onclick="walletClick('robinhood')">⊙ connect robinhood</button>
          <div class="rail" id="rail-robinhood"></div>
        </section>
      </div>
    </div>

    <script src="/vendor/lightweight-charts.standalone.production.js"></script>

    <script>
      (() => {
        const glyphs = "◇✦✧◆⟡⬦✧✦◇⋄✦✧◈";
        const field = document.getElementById("field");
        for (let i = 0; i < 22; i++) {
          const s = document.createElement("span");
          s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
          s.style.left = Math.random() * 100 + "%"; s.style.top = Math.random() * 100 + "%";
          s.style.fontSize = 10 + Math.random() * 16 + "px";
          s.style.animationDelay = -Math.random() * 14 + "s";
          s.style.animationDuration = 10 + Math.random() * 12 + "s";
          field.appendChild(s);
        }
      })();

      const rendered = new Set();
      const RAIL = 9;
      let selectedAddr = null;

      function money(n) {
        if (n == null) return "—";
        if (n >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
        if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
        if (n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
        return "$" + Math.round(n).toLocaleString();
      }
      function ago(ts) {
        const s = Math.round((Date.now() - ts) / 1000);
        if (s < 60) return s + "s ago";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        return Math.floor(s / 3600) + "h ago";
      }
      function fmtAge(ms) {
        if (!ms) return "—";
        let s = Math.round((Date.now() - ms) / 1000);
        const d = Math.floor(s / 86400); s -= d * 86400;
        const h = Math.floor(s / 3600); s -= h * 3600;
        const m = Math.floor(s / 60);
        if (d) return `${d}d ${h}h`;
        if (h) return `${h}h ${m}m`;
        return `${m}m`;
      }
      const pad = (n) => String(n).padStart(2, "0");
      const short = (a) => a ? a.slice(0, 4) + "…" + a.slice(-4) : "—";
      // ---- XSS defense: token name/symbol/description/links come from the
      // public DexScreener feed, so anyone can mint a token to inject markup.
      // Escape all of it before it touches innerHTML.
      const esc = (s) =>
        String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      // Only allow http/https URLs; anything else (javascript:, data:, …) is dropped.
      const safeUrl = (u) => {
        try {
          const url = new URL(String(u), location.origin);
          return url.protocol === "http:" || url.protocol === "https:"
            ? url.href
            : "";
        } catch {
          return "";
        }
      };
      function handleOf(u) {
        try {
          const seg = new URL(u).pathname.split("/").filter(Boolean);
          const bad = ["i", "intent", "home", "search", "hashtag", "share", "status"];
          if (seg[0] && !bad.includes(seg[0].toLowerCase())) return "@" + seg[0];
        } catch {}
        return "";
      }
      function socialsHTML(a) {
        const p = [];
        const tw = safeUrl(a.twitter), tg = safeUrl(a.telegram), ws = safeUrl(a.website);
        if (tw) p.push(`<a class="soc" href="${esc(tw)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">𝕏 ${esc(handleOf(a.twitter))}</a>`);
        if (tg) p.push(`<a class="soc" href="${esc(tg)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">✈ tg</a>`);
        if (ws) p.push(`<a class="soc" href="${esc(ws)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">◍ site</a>`);
        return p.length ? `<div class="socials">${p.join("")}</div>` : "";
      }

      function buildCard(a, featured) {
        const chain = a.chainId || "solana";
        const dir = chain === "robinhood" ? "right" : "left";
        const el = document.createElement("div");
        el.className = "card " + (featured ? "featured enter-" + dir : "mini");
        if (a.tokenAddress === selectedAddr) el.classList.add("sel");
        el.dataset.addr = a.tokenAddress;
        el.dataset.mc = a.marketCap ?? "";
        el._alert = a;
        el.onclick = () => (selectedAddr === a.tokenAddress ? closeDetail() : openDetail(a));
        const sym = a.symbol ? `<span class="sym">$${esc(a.symbol)}</span> ` : "";
        const icon = `<img class="icon" src="${esc(safeUrl(a.icon))}" onerror="this.style.visibility='hidden'"/>`;
        if (featured) {
          el.innerHTML = `
            <span class="tag">newest signal</span>
            <div class="top">${icon}
              <div class="body">
                <div class="name">${sym}${esc(a.name || "")}</div>
                <div class="desc">${esc(a.description || a.tokenAddress)}</div>
                <div class="time" data-ts="${a.ts}">${ago(a.ts)}</div>
                ${socialsHTML(a)}
              </div>
            </div>
            <div class="foot">
              <div class="mc">
                <div class="val">${money(a.marketCap)}</div>
                <div class="lbl">market cap</div>
                <div class="liq">liquidity ${money(a.liquidity)}</div>
              </div>
              <span class="hint">click to inspect →</span>
            </div>`;
        } else {
          el.innerHTML = `${icon}
            <div class="body"><div class="name">${sym || esc(a.name || a.tokenAddress.slice(0,6)+"…")}</div></div>
            <div class="mc"><div class="val">${money(a.marketCap)}</div></div>`;
        }
        return el;
      }

      function updateCount(chain) {
        const feat = document.getElementById("feature-" + chain);
        const rail = document.getElementById("rail-" + chain);
        const n = (feat.querySelector(".card") ? 1 : 0) + rail.children.length;
        const c = document.getElementById("cnt-" + chain);
        if (c) c.textContent = pad(n);
      }

      function render(a) {
        if (rendered.has(a.tokenAddress)) return;
        rendered.add(a.tokenAddress);
        const chain = a.chainId || "solana";
        const feat = document.getElementById("feature-" + chain);
        const rail = document.getElementById("rail-" + chain);
        if (!feat) return;
        const empt = feat.querySelector(".empty");
        if (empt) empt.remove();
        const cur = feat.querySelector(".card");
        if (cur) { rail.prepend(buildCard(cur._alert, false)); cur.remove(); }
        feat.appendChild(buildCard(a, true));
        while (rail.children.length > RAIL) {
          const drop = rail.lastChild;
          rendered.delete(drop.dataset.addr);
          drop.remove();
        }
        updateCount(chain);
      }

      function applyUpdate(m) {
        // chart tick first — it must fire even if the card is no longer on a rail
        if (chartCtx && chartCtx.addr === m.tokenAddress && m.price != null) tickPrice(+m.price);
        const card = document.querySelector(`.card[data-addr="${CSS.escape(m.tokenAddress)}"]`);
        if (!card) return;
        const valEl = card.querySelector(".mc .val");
        const liqEl = card.querySelector(".liq");
        if (valEl) {
          const old = card.dataset.mc ? Number(card.dataset.mc) : null;
          valEl.textContent = money(m.marketCap);
          card.dataset.mc = m.marketCap ?? "";
          if (card._alert) card._alert.marketCap = m.marketCap;
          if (old != null && m.marketCap != null && m.marketCap !== old) {
            valEl.classList.remove("up", "down"); void valEl.offsetWidth;
            valEl.classList.add(m.marketCap > old ? "up" : "down");
          }
        }
        if (liqEl) liqEl.textContent = "liquidity " + money(m.liquidity);
        if (card._alert && m.liquidity !== undefined) card._alert.liquidity = m.liquidity;
      }

      // ---- detail panel ----
      function highlight() {
        document.querySelectorAll(".card.sel").forEach((c) => c.classList.remove("sel"));
        if (selectedAddr) {
          const c = document.querySelector(`.card[data-addr="${CSS.escape(selectedAddr)}"]`);
          if (c) c.classList.add("sel");
        }
      }
      function tile(label, val, cls = "") {
        return `<div class="tile"><div class="tval ${cls}">${val}</div><div class="tlabel">${label}</div></div>`;
      }
      function pct(v) { return v == null ? "—" : (v > 0 ? "+" : "") + v.toFixed(1) + "%"; }
      function pctCls(v) { return v == null ? "" : v > 0 ? "up" : "down"; }

      function sideFor(chain) {
        return document.getElementById(chain === "solana" ? "info-left" : "info-right");
      }
      function otherSide(chain) {
        return document.getElementById(chain === "solana" ? "info-right" : "info-left");
      }

      async function openDetail(a) {
        selectedAddr = a.tokenAddress;
        highlight();
        const chain = a.chainId || "solana";
        const infoEl = sideFor(chain);
        otherSide(chain).innerHTML = "";
        document.getElementById("chartbox").innerHTML = "";
        infoEl.innerHTML = `<div class="nodes ${chain === "solana" ? "left" : "right"}"><div class="nodecol"><div class="node"><div class="nval"><span class="cursor">▊</span></div><div class="nlabel">scanning</div></div></div></div>`;
        try {
          const m = await fetch(`/api/runner/token?chain=${chain}&addr=${encodeURIComponent(a.tokenAddress)}`).then((r) => r.json());
          m.icon = a.icon; m.chainId = chain; m.tokenAddress = a.tokenAddress;
          m.url = m.url || a.url; m.symbol = m.symbol || a.symbol; m.name = m.name || a.name;
          m.twitter = a.twitter; m.telegram = a.telegram; m.website = a.website;
          renderDetail(m);
        } catch {
          infoEl.innerHTML = `<div class="dhead"><div class="dtitle">⚠ failed to load</div><div class="dactions"><button class="dclose" onclick="closeDetail()">✕</button></div></div>`;
        }
      }

      function nodeTile(label, val) {
        return `<div class="node"><div class="nval">${val}</div><div class="nlabel">${label}</div></div>`;
      }

      function renderDetail(m) {
        const chain = m.chainId === "robinhood" ? "robinhood" : "solana";
        const side = chain === "solana" ? "left" : "right";
        const infoEl = sideFor(chain);
        otherSide(chain).innerHTML = "";
        infoEl.innerHTML = `
          <div class="nodes ${side}">
            <svg class="wires" preserveAspectRatio="none"></svg>
            <button class="nclose" onclick="closeDetail()">✕</button>
            <div class="nodecol">
              ${nodeTile("market cap", money(m.marketCap))}
              ${nodeTile("liquidity", money(m.liquidity))}
              ${nodeTile("volume 24h", money(m.volume && m.volume.h24))}
              ${nodeTile("pair age", fmtAge(m.pairCreatedAt))}
            </div>
          </div>`;
        const box = infoEl.querySelector(".nodes");
        drawWires(box); // getBoundingClientRect forces layout, so this measures correctly
        setTimeout(() => drawWires(box), 60); // backup pass after any late reflow
        renderChart(m, chain);
      }

      // ---- TradingView Lightweight Charts (drag either axis to scale, like TV) ----
      let tvChart = null, tvSeries = null, chartCtx = null, currentTF = 5;
      let liveBar = null, barTimer = null, chartFirstOpen = null;
      const MONO = "'SF Mono','JetBrains Mono',Menlo,Consolas,monospace";

      function fmtPrice(v) {
        if (v >= 1) return "$" + v.toFixed(2);
        if (v >= 0.01) return "$" + v.toFixed(4);
        if (v >= 0.0001) return "$" + v.toFixed(6);
        return "$" + v.toFixed(10).replace(/0+$/, "");
      }

      function renderChart(m, chain) {
        const el = document.getElementById("chartbox");
        if (!m.pairAddress) {
          el.innerHTML = '<div class="nochart">◇ no chart — pair not indexed yet</div>';
          return;
        }
        chartCtx = { chain, pool: m.pairAddress, symbol: m.symbol || "?", addr: m.tokenAddress };
        el.innerHTML = `
          <div class="chartcard">
            <div class="charthead">
              <span class="csym">$${esc(chartCtx.symbol)}</span>
              <div class="tfs">${[1, 5, 15, 30]
                .map((t) => `<button data-tf="${t}"${t === currentTF ? ' class="on"' : ""}>${t}m</button>`)
                .join("")}</div>
              <button class="tfreset" id="zreset">reset</button>
              <span class="livedot" title="live · 2s"></span>
              <span class="cstat" id="cstat">◇ loading</span>
            </div>
            <div class="chartwrap"><div id="pricechart"></div><div class="chartmsg" id="chartmsg"></div></div>
          </div>`;
        el.querySelectorAll(".tfs button").forEach((b) => {
          b.onclick = () => {
            currentTF = +b.dataset.tf;
            el.querySelectorAll(".tfs button").forEach((x) => x.classList.toggle("on", +x.dataset.tf === currentTF));
            loadCandles();
          };
        });
        document.getElementById("zreset").onclick = () => {
          if (!tvChart) return;
          tvChart.timeScale().fitContent();
          tvChart.priceScale("right").applyOptions({ autoScale: true });
        };
        loadCandles();
      }

      function loadCandles() {
        if (!chartCtx) return;
        const msg = document.getElementById("chartmsg");
        if (msg) msg.textContent = "◇ loading candles…";
        fetch(`/api/runner/ohlcv?chain=${chartCtx.chain}&pool=${encodeURIComponent(chartCtx.pool)}&tf=${currentTF}`)
          .then((r) => r.json())
          .then((d) => buildChart(d.candles || []))
          .catch(() => buildChart([]));
      }

      function buildChart(candles) {
        const host = document.getElementById("pricechart");
        const msg = document.getElementById("chartmsg");
        const stat = document.getElementById("cstat");
        if (!host) return;
        if (tvChart) { tvChart.remove(); tvChart = null; tvSeries = null; }
        if (!candles.length) {
          if (msg) msg.textContent = "◇ no candles yet — pair is brand new";
          if (stat) { stat.textContent = "—"; stat.style.color = "var(--dim)"; }
          return;
        }
        if (msg) msg.textContent = "";
        const LC = LightweightCharts;
        const grid = "rgba(255,255,255,0.05)";
        const axis = "rgba(255,255,255,0.14)";
        tvChart = LC.createChart(host, {
          autoSize: true,
          layout: { background: { color: "transparent" }, textColor: "#7d9b93", fontFamily: MONO, fontSize: 10 },
          grid: { vertLines: { color: grid }, horzLines: { color: grid } },
          crosshair: {
            mode: LC.CrosshairMode.Normal,
            vertLine: { color: "rgba(255,255,255,0.30)", width: 1, style: 2, labelBackgroundColor: "#0e1a1c" },
            horzLine: { color: "rgba(255,255,255,0.30)", width: 1, style: 2, labelBackgroundColor: "#0e1a1c" },
          },
          rightPriceScale: { borderColor: axis, scaleMargins: { top: 0.12, bottom: 0.12 } },
          timeScale: { borderColor: axis, timeVisible: true, secondsVisible: false, rightOffset: 4 },
          // the TradingView feel: drag an axis to stretch/squeeze just that axis
          handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: true },
          handleScale: {
            mouseWheel: true,
            pinch: true,
            axisPressedMouseMove: { time: true, price: true },
            axisDoubleClickReset: { time: true, price: true },
          },
          localization: { priceFormatter: fmtPrice },
        });
        tvSeries = tvChart.addSeries(LC.CandlestickSeries, {
          upColor: "#4ade80", downColor: "#ff6b6b",
          borderUpColor: "#4ade80", borderDownColor: "#ff6b6b",
          wickUpColor: "#4ade80", wickDownColor: "#ff6b6b",
          priceFormat: { type: "custom", formatter: fmtPrice, minMove: 1e-12 },
        });
        const bars = candles.map((c) => ({ time: c.t, open: c.o, high: c.h, low: c.l, close: c.c }));
        tvSeries.setData(bars);
        tvChart.timeScale().fitContent();
        liveBar = bars[bars.length - 1];
        chartFirstOpen = bars[0].open;
        updateChangeStat(liveBar.close);

        // pull fresh completed bars periodically; the 2s SSE price ticks the forming one
        if (barTimer) clearInterval(barTimer);
        barTimer = setInterval(refreshBars, 15000);
      }

      function updateChangeStat(last) {
        const stat = document.getElementById("cstat");
        if (!stat || !chartFirstOpen) return;
        const chg = ((last - chartFirstOpen) / chartFirstOpen) * 100;
        stat.textContent = (chg >= 0 ? "+" : "") + chg.toFixed(1) + "%";
        stat.style.color = chg >= 0 ? "#4ade80" : "#ff6b6b";
      }

      // live price from the 2s feed → update (or roll) the forming candle
      function tickPrice(price) {
        if (!tvSeries || !liveBar || !isFinite(price) || price <= 0) return;
        const secs = currentTF * 60;
        const bucket = Math.floor(Date.now() / 1000 / secs) * secs;
        if (bucket > liveBar.time) {
          liveBar = { time: bucket, open: price, high: price, low: price, close: price };
        } else {
          liveBar.close = price;
          if (price > liveBar.high) liveBar.high = price;
          if (price < liveBar.low) liveBar.low = price;
        }
        tvSeries.update(liveBar);
        updateChangeStat(price);
      }

      // re-sync completed bars without disturbing the user's zoom/pan
      function refreshBars() {
        if (!chartCtx || !tvSeries || !tvChart) return;
        fetch(`/api/runner/ohlcv?chain=${chartCtx.chain}&pool=${encodeURIComponent(chartCtx.pool)}&tf=${currentTF}`)
          .then((r) => r.json())
          .then((d) => {
            const c = d.candles || [];
            if (!c.length || !tvSeries || !tvChart) return;
            const bars = c.map((x) => ({ time: x.t, open: x.o, high: x.h, low: x.l, close: x.c }));
            const last = bars[bars.length - 1];
            if (liveBar) {
              if (liveBar.time > last.time) bars.push(liveBar);
              else if (liveBar.time === last.time) {
                last.high = Math.max(last.high, liveBar.high);
                last.low = Math.min(last.low, liveBar.low);
                last.close = liveBar.close; // our 2s close is fresher
              }
            }
            const range = tvChart.timeScale().getVisibleLogicalRange();
            tvSeries.setData(bars);
            if (range) tvChart.timeScale().setVisibleLogicalRange(range);
            liveBar = bars[bars.length - 1];
          })
          .catch(() => {});
      }

      // fan the connector lines from the card-facing edge out to each metric node
      function drawWires(box) {
        if (!box) return;
        const svg = box.querySelector(".wires");
        if (!svg) return;
        const side = box.classList.contains("right") ? "right" : "left";
        const br = box.getBoundingClientRect();
        const W = Math.round(br.width), H = Math.round(br.height);
        if (!W || !H) return;
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        const ox = side === "left" ? W : 0; // origin sits against the profile card
        const oy = H / 2;
        let s = "";
        box.querySelectorAll(".node").forEach((n) => {
          const r = n.getBoundingClientRect();
          const y = r.top - br.top + r.height / 2;
          const x = side === "left" ? r.right - br.left : r.left - br.left;
          const mx = (ox + x) / 2;
          s += `<path class="wire" d="M ${ox} ${oy} C ${mx} ${oy}, ${mx} ${y}, ${x} ${y}"/>`;
          s += `<circle class="wdot" cx="${x}" cy="${y}" r="2.6"/>`;
        });
        s += `<circle class="wdot hub" cx="${ox}" cy="${oy}" r="4"/>`;
        svg.innerHTML = s;
      }
      window.addEventListener("resize", () => {
        document.querySelectorAll(".nodes").forEach(drawWires);
      });
      function closeDetail() {
        selectedAddr = null; highlight();
        if (barTimer) { clearInterval(barTimer); barTimer = null; }
        if (tvChart) { tvChart.remove(); tvChart = null; tvSeries = null; }
        chartCtx = null; liveBar = null; chartFirstOpen = null;
        document.getElementById("info-left").innerHTML = "";
        document.getElementById("info-right").innerHTML = "";
        document.getElementById("chartbox").innerHTML = "";
      }
      window.closeDetail = closeDetail;

      // ---- wallet connect (Phantom on Solana, MetaMask on Robinhood chain) ----
      // one wallet active at a time; connecting one drops the other.
      const RH_CHAIN = {
        chainId: "0x1237", // 4663
        chainName: "Robinhood Chain",
        nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
        rpcUrls: ["https://rpc.mainnet.chain.robinhood.com"],
        blockExplorerUrls: ["https://robinhoodchain.blockscout.com"],
      };
      const wallet = { solana: null, robinhood: null, active: null };

      function walletClick(chain) {
        if (wallet[chain]) return; // already connected; ✕ handles disconnect
        connectWallet(chain);
      }
      async function connectWallet(chain) {
        try {
          if (chain === "solana") {
            if (!(window.solana && window.solana.isPhantom))
              return alert("Phantom wallet not found — install the Phantom extension.");
            const resp = await window.solana.connect();
            setWallet("solana", resp.publicKey.toString());
          } else {
            if (!window.ethereum)
              return alert("No EVM wallet found — install MetaMask to use Robinhood Chain.");
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            await ensureRobinhoodChain();
            setWallet("robinhood", accounts[0]);
          }
        } catch (e) {
          console.warn("wallet connect failed:", e);
        }
      }
      async function ensureRobinhoodChain() {
        try {
          await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: RH_CHAIN.chainId }] });
        } catch (e) {
          if (e && e.code === 4902) {
            await window.ethereum.request({ method: "wallet_addEthereumChain", params: [RH_CHAIN] });
          }
        }
      }
      function setWallet(chain, addr) {
        const other = chain === "solana" ? "robinhood" : "solana";
        if (wallet[other]) disconnectWallet(other); // enforce one-at-a-time
        wallet[chain] = addr;
        wallet.active = chain;
        renderWallet();
      }
      function disconnectWallet(chain) {
        if (chain === "solana" && window.solana) { try { window.solana.disconnect(); } catch {} }
        wallet[chain] = null;
        if (wallet.active === chain) wallet.active = null;
        renderWallet();
      }
      function renderWallet() {
        for (const chain of ["solana", "robinhood"]) {
          const b = document.getElementById("wbtn-" + chain);
          if (!b) continue;
          if (wallet[chain]) {
            b.classList.add("on");
            b.innerHTML = `◉ ${esc(short(wallet[chain]))} <span class="wx" onclick="event.stopPropagation();disconnectWallet('${chain}')">✕</span>`;
          } else {
            b.classList.remove("on");
            b.innerHTML = chain === "solana" ? "⊙ connect phantom" : "⊙ connect robinhood";
          }
          b.classList.toggle("dim", !!wallet.active && wallet.active !== chain && !wallet[chain]);
        }
      }
      window.walletClick = walletClick;
      window.disconnectWallet = disconnectWallet;

      const es = new EventSource("/api/runner/stream");
      es.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (!m.type) render(m);
        else if (m.type === "update") applyUpdate(m);
        else if (m.type === "socials") applySocials(m);
      };

      function applySocials(m) {
        const card = document.querySelector(`.card[data-addr="${CSS.escape(m.tokenAddress)}"]`);
        if (!card) return;
        if (card._alert) { card._alert.twitter = m.twitter; card._alert.telegram = m.telegram; card._alert.website = m.website; }
        const body = card.querySelector(".body");
        if (card.classList.contains("featured") && body && !body.querySelector(".socials")) {
          body.insertAdjacentHTML("beforeend", socialsHTML(m));
        }
      }

      setInterval(() => {
        document.querySelectorAll(".time").forEach((t) => { t.textContent = ago(Number(t.dataset.ts)); });
      }, 5000);
    </script>

    <script>
      // synthwave wireframe terrain flowing along the bottom of the page
      (function () {
        const canvas = document.getElementById("grid3d");
        const ctx = canvas.getContext("2d");
        let W = 0, H = 0, DPR = 1;
        function resize() {
          DPR = Math.min(window.devicePixelRatio || 1, 2);
          W = canvas.clientWidth; H = canvas.clientHeight;
          canvas.width = W * DPR; canvas.height = H * DPR;
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        }
        window.addEventListener("resize", resize);

        // seamless value noise for the heightmap
        function hash(x, y) {
          let n = (x * 374761393 + y * 668265263) >>> 0;
          n = ((n ^ (n >>> 13)) * 1274126177) >>> 0;
          return ((n ^ (n >>> 16)) >>> 0) / 4294967295;
        }
        function noise(x, z) {
          const xi = Math.floor(x), zi = Math.floor(z), xf = x - xi, zf = z - zi;
          const u = xf * xf * (3 - 2 * xf), v = zf * zf * (3 - 2 * zf);
          const tl = hash(xi, zi), tr = hash(xi + 1, zi), bl = hash(xi, zi + 1), br = hash(xi + 1, zi + 1);
          return (tl * (1 - u) + tr * u) * (1 - v) + (bl * (1 - u) + br * u) * v;
        }
        function heightAt(c, z) {
          return noise(c * 0.26, z * 0.26) + noise(c * 0.62, z * 0.62) * 0.4;
        }

        const COLS = 66, ROWS = 27;
        const zNear = 10, dz = 3.4, dx = 7, amp = 12, eyeH = 52;
        let t = 0;

        function frame() {
          if (!W) resize();
          ctx.clearRect(0, 0, W, H);
          t += 0.018;
          const focal = H * 0.13;
          const horizon = H * 0.32;
          const scroll = t;

          // project every grid vertex once
          const P = [];
          for (let r = 0; r < ROWS; r++) {
            const worldZ = zNear + r * dz;
            const scale = focal / worldZ;
            const row = [];
            for (let c = 0; c < COLS; c++) {
              const worldX = (c - (COLS - 1) / 2) * dx;
              const y = heightAt(c, r + scroll) * amp;
              row.push([W / 2 + worldX * scale, horizon + (eyeH - y) * scale]);
            }
            P.push(row);
          }

          function drawPass(color, width) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            for (let r = 0; r < ROWS; r++) {
              for (let c = 0; c < COLS; c++) {
                const p = P[r][c];
                if (c < COLS - 1) { ctx.moveTo(p[0], p[1]); ctx.lineTo(P[r][c + 1][0], P[r][c + 1][1]); }
                if (r < ROWS - 1) { ctx.moveTo(p[0], p[1]); ctx.lineTo(P[r + 1][c][0], P[r + 1][c][1]); }
                if (c < COLS - 1 && r < ROWS - 1) { ctx.moveTo(p[0], p[1]); ctx.lineTo(P[r + 1][c + 1][0], P[r + 1][c + 1][1]); }
              }
            }
            ctx.stroke();
          }
          drawPass("rgba(255,255,255,0.08)", 2.2);   // soft glow underlay
          drawPass("rgba(255,255,255,0.5)", 0.8);  // crisp teal lines

          requestAnimationFrame(frame);
        }
        resize();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
